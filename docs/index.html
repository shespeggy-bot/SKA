<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SKA · 四页预览</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        background: #1a1a1a;
        color: #fff;
      }
      .chrome {
        background: #2d2d2d;
        border-bottom: 1px solid rgba(0, 0, 0, 0.35);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
      }
      .chrome-inner {
        max-width: 1200px;
        margin: 0 auto;
        padding: 14px 16px 16px;
      }
      .tabs {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }
      .tabs button {
        appearance: none;
        -webkit-appearance: none;
        margin: 0;
        padding: 10px 22px;
        border: none;
        border-radius: 999px;
        background: #4a4a4a;
        color: #fff;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition: background 0.15s ease, transform 0.1s ease;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }
      .tabs button:hover {
        background: #555;
      }
      .tabs button:active {
        transform: scale(0.98);
      }
      .tabs button[aria-selected="true"] {
        background: linear-gradient(180deg, #ff8a3d 0%, #ff6a00 55%, #f55a00 100%);
        color: #fff;
        box-shadow: 0 2px 8px rgba(255, 106, 0, 0.35),
          inset 0 1px 0 rgba(255, 255, 255, 0.25);
      }
      .tabs button[aria-selected="true"]:hover {
        background: linear-gradient(180deg, #ff9348 0%, #ff7514 55%, #ff6210 100%);
      }
      /* 手机外框：固定 750×1624，内部 iframe 视口同尺寸，页面超出部分在「手机」内滚动 */
      .stage {
        min-height: calc(100vh - 70px);
        padding: 20px 16px 32px;
        background: #141414;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        overflow-x: auto;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
      }
      .phone {
        position: relative;
        width: 750px;
        height: 1624px;
        flex-shrink: 0;
        border-radius: 32px;
        background: #0d0d0f;
        box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.1),
          0 20px 50px rgba(0, 0, 0, 0.55),
          inset 0 0 0 1px rgba(0, 0, 0, 0.45);
        box-sizing: border-box;
        overflow: hidden;
      }
      .phone-screen {
        position: relative;
        width: 750px;
        height: 1624px;
        overflow: hidden;
        background: #000;
      }
      .phone-screen iframe {
        position: absolute;
        left: 0;
        top: 0;
        width: 750px;
        height: 1624px;
        max-width: none;
        border: 0;
        background: #fff;
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
        z-index: 0;
      }
      .phone-screen iframe.is-active {
        opacity: 1;
        visibility: visible;
        pointer-events: auto;
        z-index: 1;
      }
    </style>
  </head>
  <body>
    <header class="chrome" role="banner">
      <div class="chrome-inner">
        <div class="tabs" role="tablist" aria-label="页面筛选">
          <button type="button" role="tab" aria-selected="true" data-page="activity">
            活动页
          </button>
          <button type="button" role="tab" aria-selected="false" data-page="signin">
            签到弹窗
          </button>
          <button type="button" role="tab" aria-selected="false" data-page="prize-won">
            抽中奖品
          </button>
          <button type="button" role="tab" aria-selected="false" data-page="store-list">
            门店列表
          </button>
        </div>
      </div>
    </header>
    <main class="stage">
      <div class="phone" aria-label="手机预览区域，750×1624 像素">
        <div class="phone-screen" id="frames">
          <iframe
            class="page-frame is-active"
            title="活动页"
            data-page="activity"
            width="750"
            height="1624"
            scrolling="yes"
          ></iframe>
          <iframe
            class="page-frame"
            title="签到弹窗"
            data-page="signin"
            width="750"
            height="1624"
            scrolling="yes"
          ></iframe>
          <iframe
            class="page-frame"
            title="抽中奖品"
            data-page="prize-won"
            width="750"
            height="1624"
            scrolling="yes"
          ></iframe>
          <iframe
            class="page-frame"
            title="门店列表"
            data-page="store-list"
            width="750"
            height="1624"
            scrolling="yes"
          ></iframe>
        </div>
      </div>
    </main>
    <script>
      (function () {
        /**
         * GitHub Pages 上可能是 …/SKA 或 …/SKA/ 或 …/SKA/index.html。
         * 相对路径 activity/index.html 在 …/SKA（无斜杠）时会错误解析到 …/activity/…
         */
        function siteBase() {
          var path = window.location.pathname;
          if (path.endsWith("/index.html")) {
            path = path.slice(0, -"/index.html".length);
          }
          if (!path.endsWith("/")) {
            path += "/";
          }
          return window.location.origin + path;
        }

        var base = siteBase();
        var frames = document.querySelectorAll("iframe.page-frame");
        var tabs = document.querySelectorAll('.tabs button[role="tab"]');

        frames.forEach(function (frame) {
          var page = frame.getAttribute("data-page");
          if (page) {
            frame.src = base + page + "/index.html";
          }
        });

        function selectPage(page) {
          tabs.forEach(function (b) {
            var on = b.getAttribute("data-page") === page;
            b.setAttribute("aria-selected", on ? "true" : "false");
          });
          frames.forEach(function (f) {
            f.classList.toggle("is-active", f.getAttribute("data-page") === page);
          });
          try {
            history.replaceState(null, "", "#" + page);
          } catch (e) {}
        }

        tabs.forEach(function (btn) {
          btn.addEventListener("click", function () {
            var page = btn.getAttribute("data-page");
            if (page) selectPage(page);
          });
        });

        var hash = (location.hash || "").replace(/^#/, "");
        if (hash && document.querySelector('[data-page="' + hash + '"]')) {
          selectPage(hash);
        }

        window.addEventListener("hashchange", function () {
          var h = (location.hash || "").replace(/^#/, "");
          if (h && document.querySelector('.tabs button[data-page="' + h + '"]')) {
            selectPage(h);
          }
        });
      })();
    </script>
  </body>
</html>
