<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SKA · 四页预览</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        background: #1a1a1a;
        color: #fff;
      }
      /* 顶栏：深灰底，与第一张筛选 Tab 示意一致 */
      .chrome {
        background: #2d2d2d;
        border-bottom: 1px solid rgba(0, 0, 0, 0.35);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
      }
      .chrome-inner {
        max-width: 1200px;
        margin: 0 auto;
        padding: 14px 16px 16px;
      }
      .tabs {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
        gap: 10px;
      }
      .tabs button {
        appearance: none;
        -webkit-appearance: none;
        margin: 0;
        padding: 10px 22px;
        border: none;
        border-radius: 999px;
        background: #4a4a4a;
        color: #fff;
        font-size: 14px;
        font-weight: 500;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition: background 0.15s ease, transform 0.1s ease;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }
      .tabs button:hover {
        background: #555;
      }
      .tabs button:active {
        transform: scale(0.98);
      }
      /* 选中：橙底白字 */
      .tabs button[aria-selected="true"] {
        background: linear-gradient(180deg, #ff8a3d 0%, #ff6a00 55%, #f55a00 100%);
        color: #fff;
        box-shadow: 0 2px 8px rgba(255, 106, 0, 0.35),
          inset 0 1px 0 rgba(255, 255, 255, 0.25);
      }
      .tabs button[aria-selected="true"]:hover {
        background: linear-gradient(180deg, #ff9348 0%, #ff7514 55%, #ff6210 100%);
      }
      .frame-wrap {
        height: calc(100vh - 70px);
        background: #111;
      }
      iframe {
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
        background: #000;
      }
    </style>
  </head>
  <body>
    <header class="chrome" role="banner">
      <div class="chrome-inner">
        <div class="tabs" role="tablist" aria-label="页面筛选">
          <button type="button" role="tab" aria-selected="true" data-src="activity/index.html">
            活动页
          </button>
          <button type="button" role="tab" aria-selected="false" data-src="signin/index.html">
            签到弹窗
          </button>
          <button type="button" role="tab" aria-selected="false" data-src="prize-won/index.html">
            抽中奖品
          </button>
          <button type="button" role="tab" aria-selected="false" data-src="store-list/index.html">
            门店列表
          </button>
        </div>
      </div>
    </header>
    <div class="frame-wrap">
      <iframe id="preview" title="页面预览" src="activity/index.html"></iframe>
    </div>
    <script>
      (function () {
        var iframe = document.getElementById("preview");
        var tabs = document.querySelectorAll('.tabs button[role="tab"]');
        tabs.forEach(function (btn) {
          btn.addEventListener("click", function () {
            tabs.forEach(function (b) {
              b.setAttribute("aria-selected", "false");
            });
            btn.setAttribute("aria-selected", "true");
            var src = btn.getAttribute("data-src");
            if (src) iframe.src = src;
          });
        });
      })();
    </script>
  </body>
</html>
